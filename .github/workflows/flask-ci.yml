name: Flask CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: Lint with flake8
      run: |
        flake8 app.py models.py --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Test with pytest
      run: |
        pytest --cov=. --cov-report=xml -v || true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: |
        docker build -t carved-rock-flask:${{ github.sha }} .
        docker build -t carved-rock-flask:latest .
    
    - name: Test Docker image
      run: |
        docker run --rm -d --name test-flask -p 5000:5000 carved-rock-flask:latest
        sleep 3
        docker ps
        curl -f http://localhost:5000 || echo "Connection check"
        docker stop test-flask || true
    
    - name: Login to Docker Hub (optional - add secrets.DOCKER_USERNAME and secrets.DOCKER_PASSWORD)
      if: github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != ''
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Push to Docker Hub (optional)
      if: github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != ''
      run: |
        docker tag carved-rock-flask:latest ${{ secrets.DOCKER_USERNAME }}/carved-rock-flask:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/carved-rock-flask:latest

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run safety check for vulnerabilities
      run: |
        pip install safety
        safety check --file requirements.txt || true
