version: '3.8'

services:
  web:
    build: .
    container_name: carved-rock-flask
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - FLASK_DEBUG=True
      - SECRET_KEY=your-dev-secret-key
    volumes:
      - .:/app
      - /app/__pycache__
    command: flask run --host=0.0.0.0
    networks:
      - carved-rock-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  carved-rock-network:
    driver: bridge

volumes:
  flask-data:
